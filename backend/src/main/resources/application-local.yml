# 本地 / 服务器部署：在此填写数据库与各密钥（不使用环境变量）。
# 建议勿提交本文件；可复制 application-local.yml.example 后改名填写。
#
# --- 若报错 Connection refused（连 公网IP:3306）---
# 常见原因：MySQL 在 ECS 上只监听 127.0.0.1，未对公网开放 3306。
# 处理：宝塔 → 数据库 → MySQL → 配置修改：bind-address 设为 0.0.0.0 或注释该项；
#      阿里云安全组入方向放行 TCP 3306（建议仅你的公网 IP）；
#      宝塔中为该用户开启「远程」并授权你的 IP。
#
# --- 临时方案（不对外开放 3306）：SSH 本地转发 ---
#   ssh -L 3307:127.0.0.1:3306 root@你的ECS公网IP
# 然后把下面 url 的主机改为 127.0.0.1、端口改为 3307（保持本机 Spring 连隧道）。

