spring:
  application:
    name: speaking-killer-api
  # 仅支持 MySQL：连接信息必须在 application-local.yml 中配置（见 application-local.yml.example）
  profiles:
    active: local
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.speaker.app.model.entity
  type-handlers-package: com.speaker.app.mybatis.typehandler
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

server:
  port: 8080
  error:
    include-message: always

app:
  jwt:
    secret: change-me-to-a-long-random-string-at-least-256-bits
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:5173
  security:
    rate-limit:
      auth-per-minute: 20
      api-per-minute: 120
      ai-per-minute: 30
  dashscope:
    api-key: ""
    chat-model: qwen-turbo
    asr-model: qwen3-asr-flash
    tts-model: cosyvoice-v3-flash
    tts-voice: longanyang
    tts-format: mp3
    tts-sample-rate: 24000
    tts-max-chars: 8000
  wechat:
    mini-app-id: ""
    mini-app-secret: ""
  admin:
    api-key: "jq speaker awsome"

logging:
  level:
    com.speaker.app: INFO
    org.springframework.security: WARN
